server {
    listen 80;
    server_name _;

    # 动态 resolver，由 start.sh 在启动时注入（兼容 Docker/Podman）
    resolver __RESOLVER__ valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # React SPA — serve index.html for all non-file routes
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy → geo-api container
    # 使用变量写法，让 nginx 在请求时解析 DNS，而非启动时
    location /api/ {
        set $api_upstream http://geo-api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Quartz 4 knowledge base — proxy to existing Quartz container
    location ^~ /notes/ {
        set $quartz_upstream http://quartz_note:8080;
        rewrite ^/notes/(.*)$ /$1 break;
        proxy_pass $quartz_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
