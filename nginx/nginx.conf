server {
    listen 80;
    server_name _;

    # geo-net 的 dnsname 插件 DNS 服务器（固定为网关 IP）
    resolver 10.89.0.1 valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # React SPA — serve index.html for all non-file routes
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy → geo-api container (DNS resolved at request time)
    location /api/ {
        set $api_upstream http://geo-api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Quartz 知识库内容页面 — 去掉 /notes/ 前缀后转发
    location ^~ /notes/ {
        set $quartz http://quartz-notes:8080;
        rewrite ^/notes/(.*)$ /$1 break;
        proxy_pass $quartz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Quartz 静态资源（CSS/JS，绝对路径 /quartz/...）
    location ^~ /quartz/ {
        set $quartz http://quartz-notes:8080;
        proxy_pass $quartz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
