version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Frontend: Nginx serving built React SPA
  # ─────────────────────────────────────────────
  geo-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: geo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - geo-api
      - quartz-notes
    networks:
      geo-net:
        aliases:
          - geo-frontend

  # ─────────────────────────────────────────────
  # API: Lightweight Node.js backend
  # ─────────────────────────────────────────────
  geo-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: geo-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATA_DIR=/app/data
      - CONTENT_PATH=/app/content
      # Cloudflare R2 (optional — enable when configured)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    volumes:
      - ./data:/app/data               # Persistent locations.json & app-config.json
      - ./content:/app/content:ro      # Read-only: Quartz notes (symlink to filebro_notes)
    expose:
      - "3001"
    networks:
      geo-net:
        aliases:
          - geo-api

  # ─────────────────────────────────────────────
  # Quartz 4 知识库
  # nginx 将 /notes/ 和 /quartz/ 代理至此容器
  # 同时 4001 端口对外开放（完整笔记导航）
  # ─────────────────────────────────────────────
  quartz-notes:
    image: uhub.service.ucloud.cn/syyy/quartz:sha-ec00a40
    container_name: quartz-notes
    restart: unless-stopped
    volumes:
      - /opt/geo-blog/content:/usr/src/app/content:ro
    ports:
      - "4001:8080"
    expose:
      - "8080"
    networks:
      geo-net:
        aliases:
          - quartz-notes

networks:
  geo-net:
    external: true   # 使用已存在的 podman 网络，不重新创建
